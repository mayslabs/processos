<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processos Previdenciários</title>
<link rel="icon" href="data:,">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar:220px;--panel:620px;
  --bg:#F1F5F9;--surface:#fff;
  --sb-bg:#F8FAFC;--sb-text:#64748B;
  --primary:#2563EB;--primary-dark:#1D4ED8;
  --text:#1E293B;--muted:#64748B;--border:#E2E8F0;
  --alert:#EF4444;--warn:#F59E0B;--ok:#10B981;
  --c1:#6366F1;--c2:#F59E0B;--c3:#3B82F6;--c4:#8B5CF6;--c5:#10B981;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex}

/* ── AUTH ── */
.auth-locked .sidebar,.auth-locked .main{display:none}
.auth-view{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#E0F2FE 0%,#F8FAFC 45%,#EEF2FF 100%);z-index:500;align-items:center;justify-content:center;padding:24px}
.auth-locked .auth-view{display:flex}
.auth-card{width:min(420px,100%);background:#fff;border:1px solid var(--border);border-radius:14px;padding:26px;box-shadow:0 24px 60px rgba(15,23,42,.18)}
.auth-brand{display:flex;gap:14px;align-items:center;margin-bottom:22px}
.auth-mark{width:44px;height:44px;border-radius:12px;background:#EFF6FF;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:800}
.auth-brand h1{font-size:22px;line-height:1.2;margin-bottom:4px;color:var(--text)}
.auth-brand p{font-size:13px;color:var(--muted)}
.auth-label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:14px 0 6px}
.auth-input{width:100%;border:1px solid var(--border);border-radius:9px;padding:11px 12px;font-size:15px;color:var(--text);outline:none;font-family:inherit;background:#fff}
.auth-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.auth-submit{width:100%;margin-top:18px;border:none;border-radius:9px;background:var(--primary);color:#fff;padding:11px 14px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.auth-submit:hover{background:var(--primary-dark)}
.auth-submit:disabled{opacity:.65;cursor:wait}
.auth-error{display:none;border:1px solid #FECACA;background:#FEF2F2;color:#B91C1C;border-radius:9px;padding:10px 12px;font-size:13px;margin-bottom:14px}
.auth-error.on{display:block}
.auth-help{font-size:12px;color:var(--muted);line-height:1.45;margin-top:14px;text-align:center}
.user-menu{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.logout-btn{border:1px solid var(--border);background:#fff;color:var(--text);border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.logout-btn:hover{border-color:var(--primary);color:var(--primary)}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:var(--sb-bg);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border);transition:width .2s ease}
.sb-logo{padding:22px 20px;border-bottom:1px solid var(--border)}
.sb-logo h1{font-size:16px;font-weight:700;color:var(--text);line-height:1.3;display:flex;align-items:center;gap:6px;white-space:nowrap}
.sb-logo .sb-mark{font-size:16px;line-height:1}
.sb-logo .sb-subtitle{font-size:12px;color:var(--muted)}
.sb-nav{padding:14px 10px;display:flex;flex-direction:column;gap:4px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:14px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:all .15s}
.nav-btn:hover{background:#EEF2FF;color:var(--primary)}
.nav-btn.active{background:var(--primary);color:#fff}
.nav-btn svg{width:17px;height:17px;flex-shrink:0}
.sb-count{margin-left:auto;background:var(--border);color:var(--muted);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
.nav-btn.active .sb-count{background:rgba(255,255,255,.25);color:#fff}
body.sidebar-collapsed .sidebar{width:64px}
body.sidebar-collapsed .sb-logo{padding:18px 10px;text-align:center}
body.sidebar-collapsed .sb-logo h1{justify-content:center}
body.sidebar-collapsed .sb-brand-text,
body.sidebar-collapsed .sb-subtitle,
body.sidebar-collapsed .nav-label,
body.sidebar-collapsed .sb-count{display:none}
body.sidebar-collapsed .sb-nav{padding:14px 8px}
body.sidebar-collapsed .nav-btn{justify-content:center;padding:11px 0}
body.sidebar-collapsed .kanban-alerts{display:none}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0}
.topbar-title{font-size:19px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:10px}
.sidebar-toggle{width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.sidebar-toggle:hover{border-color:var(--primary);color:var(--primary);background:#EFF6FF}
.sidebar-toggle svg{width:18px;height:18px}
body.sidebar-collapsed .sidebar-toggle svg{transform:rotate(180deg)}
.search{border:1px solid var(--border);border-radius:8px;padding:8px 13px;font-size:14px;width:220px;outline:none;background:var(--bg);color:var(--text);font-family:inherit}
.search:focus{border-color:var(--primary)}
.btn-add{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-add:hover{background:var(--primary-dark)}

/* ── PAGES ── */
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.active{display:flex}

/* ── KANBAN ── */
.board{flex:1;display:flex;gap:14px;padding:18px 20px;overflow-x:auto;overflow-y:hidden;align-items:flex-start}
.kanban-alerts{margin:8px 10px 14px;padding-top:12px;border-top:1px solid var(--border);overflow-y:auto;min-height:0}
.kanban-alerts.empty{color:var(--muted)}
.kanban-alert-head{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px}
.kanban-alert-title{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:#991B1B;line-height:1.25}
.kanban-alerts.empty .kanban-alert-title{color:var(--muted)}
.kanban-alert-count{font-size:9px;font-weight:800;color:#991B1B;background:#FEE2E2;border-radius:999px;padding:2px 6px;white-space:nowrap}
.kanban-alert-row{display:flex;flex-direction:column;gap:6px}
.kanban-alert-item{width:100%;border:1px solid #FECACA;background:#FEF2F2;border-radius:8px;padding:7px 8px;cursor:pointer}
.kanban-alert-item:hover{border-color:#EF4444;background:#FEE2E2}
.kanban-alert-item.payment{border-color:#BBF7D0;background:#F0FDF4}
.kanban-alert-item.payment:hover{border-color:#22C55E;background:#DCFCE7}
.kanban-alert-item.task{border-color:#FED7AA;background:#FFF7ED}
.kanban-alert-item.task:hover{border-color:#F97316;background:#FFEDD5}
.kanban-alert-client{font-size:11px;font-weight:900;color:#7F1D1D;margin-bottom:3px;line-height:1.25}
.kanban-alert-desc{font-size:10px;color:#991B1B;line-height:1.25;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.kanban-alert-date{font-size:10px;font-weight:900;color:#B91C1C;line-height:1.2}
.kanban-alert-item.payment .kanban-alert-client{color:#14532D}
.kanban-alert-item.payment .kanban-alert-desc{color:#166534}
.kanban-alert-item.payment .kanban-alert-date{color:#15803D}
.kanban-alert-item.task .kanban-alert-client{color:#7C2D12}
.kanban-alert-item.task .kanban-alert-desc{color:#9A3412}
.kanban-alert-item.task .kanban-alert-date{color:#C2410C}
.kanban-alert-section + .kanban-alert-section{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.kanban-alert-empty{font-size:11px;color:var(--muted);line-height:1.35}
.col{flex-shrink:0;width:255px;display:flex;flex-direction:column;max-height:100%}
.col-head{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-bottom:3px solid var(--cc);border-radius:10px 10px 0 0}
.col-dot{width:9px;height:9px;border-radius:50%;background:var(--cc);flex-shrink:0}
.col-name{font-size:13px;font-weight:700;color:var(--text);flex:1;text-transform:uppercase;letter-spacing:.03em}
.col-cnt{font-size:12px;font-weight:700;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:10px}
.col-body{flex:1;overflow-y:auto;padding:8px;background:#F8FAFC;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;min-height:160px;display:flex;flex-direction:column;gap:8px}
.col-body.over{background:#EEF2FF;border-color:var(--primary)}
.col-empty{text-align:center;padding:24px 12px;color:var(--muted);font-size:12px}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:10px;padding:11px 12px;cursor:pointer;transition:all .15s;user-select:none;position:relative}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.09);transform:translateY(-1px)}
.card.has-color{border-color:var(--border)}
.card.dragging{opacity:.4;transform:scale(.97)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px}
.card-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;flex:1;margin-right:6px}
.card-alert{color:var(--alert);flex-shrink:0;display:flex;align-items:center}
.card-alert svg{width:16px;height:16px}
.card-benefit{font-size:12px;color:var(--muted);margin-bottom:7px}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;color:#fff;white-space:nowrap}
.card-deadline{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.card-deadline.overdue{color:var(--alert);font-weight:700}
.card-deadline.urgent{color:var(--alert);font-weight:600}
.card-deadline.warning{color:var(--warn);font-weight:600}
.card-process-deadline{margin-top:8px;border:1px solid #FECACA;background:#FEF2F2;color:#991B1B;border-radius:8px;padding:7px 8px;font-size:11px;font-weight:800;line-height:1.35}
.card-process-label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;color:#B91C1C}
.card-payment-deadline{margin-top:8px;border:1px solid #BBF7D0;background:#F0FDF4;color:#14532D;border-radius:8px;padding:7px 8px;font-size:11px;font-weight:800;line-height:1.35}
.card-payment-label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;color:#15803D}
.card-via{margin-top:5px}
.via-pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.via-pill.j{background:#EDE9FE;color:#7C3AED}
.via-pill.a{background:#DBEAFE;color:#1D4ED8}

/* ── TASKS PAGE ── */
.tasks-bar{display:flex;gap:2px;padding:12px 20px 0;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto}
.tf-btn{padding:8px 14px;border-radius:8px 8px 0 0;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);border:1px solid transparent;border-bottom:none;background:none;transition:all .15s;font-family:inherit}
.tf-btn.active{background:var(--surface);color:var(--primary);border-color:var(--border);font-weight:700}
.tasks-layout{flex:1;display:flex;overflow:hidden}
.tasks-list{flex:1;overflow-y:auto;padding:18px 22px}
.tasks-cal{width:310px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);padding:18px;overflow-y:auto}
.tgroup-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:10px;margin-top:20px}
.tgroup-title:first-child{margin-top:0}
.ti{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;transition:border .15s}
.ti.overdue{border-left:3px solid var(--alert)}
.ti.urgent{border-left:3px solid var(--alert)}
.ti.warning{border-left:3px solid var(--warn)}
.ti.done-item{opacity:.6}
.ti.process-deadline{border-left:4px solid #DC2626;background:#FFFBFB}
.ti.payment-deadline{border-left:4px solid #16A34A;background:#F0FDF4}
.task-kind{display:inline-flex;align-items:center;width:max-content;max-width:100%;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-top:6px}
.task-kind.process{background:#FEE2E2;color:#B91C1C}
.task-kind.internal{background:#E0F2FE;color:#0369A1}
.task-kind.payment{background:#DCFCE7;color:#166534}
.ti-check{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ti-check:hover{border-color:var(--primary)}
.ti-check.done{background:var(--ok);border-color:var(--ok)}
.ti-check.done::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.ti-body{flex:1}
.ti-client{font-size:13px;font-weight:700;color:var(--text);cursor:pointer}
.ti-client:hover{color:var(--primary);text-decoration:underline}
.ti-desc{font-size:12px;color:var(--muted);margin-top:2px}
.ti-date{font-size:11px;margin-top:4px;font-weight:600}
.ti-date.overdue{color:var(--alert)}
.ti-date.urgent{color:var(--alert)}
.ti-date.warning{color:var(--warn)}
.ti-date.ok{color:var(--muted);font-weight:400}
.ti-date.none{color:var(--muted);font-weight:400}
.tasks-empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav button{border:none;background:none;cursor:pointer;padding:5px 10px;border-radius:6px;color:var(--muted);font-size:16px;transition:background .1s}
.cal-nav button:hover{background:var(--bg)}
.cal-month{font-size:15px;font-weight:700;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dname{font-size:10px;font-weight:700;text-align:center;color:var(--muted);padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:7px;cursor:pointer;position:relative;color:var(--text);transition:background .1s}
.cal-day:hover{background:var(--bg)}
.cal-day.other{color:#CBD5E1}
.cal-day.today{background:var(--primary);color:#fff;font-weight:700}
.cal-day.has-task::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--alert)}
.cal-day.has-process::after{width:7px;height:7px;background:#DC2626}
.cal-day.has-payment::after{width:7px;height:7px;background:#16A34A}
.cal-day.today.has-task::after{background:#fff}
.cal-day.selected:not(.today){background:#EEF2FF;color:var(--primary);font-weight:700}
.cal-preview{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.cal-preview-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.cal-pi{padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.cal-pi:last-child{border-bottom:none}
.cal-pi-client{font-weight:700;color:var(--text)}
.cal-pi-desc{color:var(--muted);margin-top:1px}

/* ── SIDE PANEL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.on{opacity:1;pointer-events:all}
.panel{position:fixed;top:0;right:0;width:min(var(--panel),100vw);height:100vh;background:var(--surface);z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-8px 0 32px rgba(0,0,0,.14)}
.panel.on{transform:translateX(0)}
.panel-hd{padding:20px 26px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:16px;flex-shrink:0;background:#fff}
.panel-hd-info{flex:1}
.panel-name{font-size:21px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.25}
.panel-sub{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.close-btn{border:none;background:var(--bg);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);flex-shrink:0;font-size:16px;transition:all .15s}
.close-btn:hover{background:var(--border);color:var(--text)}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 26px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;background:#fff}
.panel-tabs::-webkit-scrollbar{display:none}
.ptab{padding:12px 14px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.ptab:hover{color:var(--text)}
.ptab.active{color:var(--primary);border-bottom-color:var(--primary)}
.panel-body{flex:1;overflow-y:auto;padding:20px 26px;background:#F8FAFC}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── CASE PANEL ── */
.case-stack{display:flex;flex-direction:column;gap:14px}
.case-section{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
.case-section.soft{background:#F8FAFC;box-shadow:none}
.case-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
.case-hero{display:grid;grid-template-columns:1.05fr .95fr;gap:12px;align-items:stretch}
.case-status{border-left:4px solid var(--primary);padding:14px 14px 14px 16px;background:#fff;border-radius:12px;border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.case-status-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:7px}
.case-status-main{font-size:17px;font-weight:800;color:var(--text);line-height:1.25;margin-bottom:6px}
.case-status-sub{font-size:13px;color:var(--muted);line-height:1.45}
.next-task-card{background:#102033;color:#fff;border-radius:12px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;min-height:120px}
.next-task-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#B7C7DA;margin-bottom:8px}
.next-task-title{font-size:15px;font-weight:800;line-height:1.35;margin-bottom:8px}
.next-task-date{display:inline-flex;align-items:center;width:max-content;max-width:100%;font-size:12px;font-weight:800;border-radius:999px;padding:5px 10px;background:rgba(255,255,255,.14);color:#fff}
.next-task-date.overdue{background:#FEE2E2;color:#B91C1C}
.next-task-date.urgent{background:#FFE4E6;color:#BE123C}
.next-task-date.warning{background:#FEF3C7;color:#92400E}
.case-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}
.metric-tile{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;min-width:0}
.metric-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.metric-value{font-size:14px;font-weight:800;color:var(--text);line-height:1.3;word-break:break-word}
.metric-value.empty{font-weight:500;color:var(--muted);font-style:italic}
.case-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-cell{min-width:0}
.info-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px}
.info-value{font-size:14px;color:var(--text);line-height:1.45;word-break:break-word}
.info-value.empty{color:var(--muted);font-style:italic}
.summary-text{font-size:14px;color:var(--text);line-height:1.65;white-space:pre-wrap}
.summary-text.empty{color:var(--muted);font-style:italic}
.case-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
.action-block{min-width:0}
.color-row{display:flex;flex-wrap:wrap;gap:7px}

.btn-panel-action:hover{border-color:var(--primary);color:var(--primary);background:#EFF6FF}

.process-alert-panel{background:#FEF2F2;border:1px solid #FECACA;border-left:4px solid #DC2626;border-radius:12px;padding:14px;color:#991B1B}

/* ── PANEL FIELDS ── */
.fl{margin-bottom:16px}

.edit-area{display:none;flex-direction:column;gap:6px}
.edit-area.on{display:flex}
.fi{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:13px;color:var(--text);outline:none;font-family:inherit;background:var(--surface);resize:vertical}
.fi:focus{border-color:var(--primary)}
.fi-select{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:13px;color:var(--text);outline:none;font-family:inherit;background:var(--surface);cursor:pointer}
.fi-select:focus{border-color:var(--primary)}
.btn-row{display:flex;gap:6px}
.btn-s{font-size:12px;padding:5px 13px;border-radius:6px;cursor:pointer;border:none;font-weight:600;font-family:inherit;transition:all .15s}
.btn-s.p{background:var(--primary);color:#fff}.btn-s.p:hover{background:var(--primary-dark)}
.btn-s.g{background:var(--bg);color:var(--text);border:1px solid var(--border)}.btn-s.g:hover{border-color:var(--primary)}
.btn-s.danger{background:#FEF2F2;color:var(--alert);border:1px solid #FECACA}.btn-s.danger:hover{background:#FEE2E2;border-color:var(--alert)}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
/* ── CARD COLOR SWATCHES ── */
.card-colors{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.cc-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.cc-swatch:hover{transform:scale(1.15)}
.cc-swatch.sel{border-color:#fff;box-shadow:0 0 0 2px var(--primary);transform:scale(1.1)}
.cc-none{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0}
.cc-none:hover{border-color:var(--alert);transform:scale(1.1)}
/* ── DELETE ZONE ── */
.delete-zone{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-delete-card{width:100%;padding:10px;border-radius:8px;border:1px solid #FECACA;background:#FEF2F2;color:var(--alert);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-delete-card:hover{background:#FEE2E2;border-color:var(--alert)}

/* ── CREDENTIALS ── */
.cred-box{background:var(--bg);border-radius:10px;padding:13px;margin-bottom:12px}
.cred-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:4px}
.cred-val{font-size:13px;color:var(--text);font-weight:600}
.pwd-row{display:flex;align-items:center;gap:8px}
.pwd-mask{font-size:20px;letter-spacing:2px;color:var(--muted);line-height:1}
.reveal-btn{border:1px solid var(--border);background:var(--surface);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s;font-family:inherit;white-space:nowrap}
.reveal-btn:hover{border-color:var(--primary);color:var(--primary)}

/* ── TASKS IN PANEL ── */
.task-pi{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.task-pi.process-deadline{border-left:4px solid #DC2626;background:#FFFBFB;border-bottom-color:#FECACA;padding-left:10px;padding-right:8px;border-radius:8px;margin-bottom:6px}
.task-pi:last-child{border-bottom:none}
.task-pcheck{width:17px;height:17px;border:2px solid var(--border);border-radius:50%;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-pcheck:hover{border-color:var(--ok)}
.task-pcheck.done{background:var(--ok);border-color:var(--ok)}
.task-pcheck.done::after{content:'✓';color:#fff;font-size:9px;font-weight:700}
.task-pbody{flex:1}
.task-pdesc{font-size:13px;color:var(--text)}
.task-pdesc.done{text-decoration:line-through;color:var(--muted)}
.task-pdate{font-size:11px;margin-top:2px}
.task-pdate.overdue{color:var(--alert);font-weight:600}
.task-pdate.urgent{color:var(--alert);font-weight:600}
.task-pdate.warning{color:var(--warn);font-weight:600}
.task-pdate.ok{color:var(--muted)}
.task-pdel{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0 4px;transition:color .1s;flex-shrink:0;margin-top:1px}
.task-pdel:hover{color:var(--alert)}
.add-task-box{background:var(--bg);border-radius:10px;padding:12px;margin-top:12px}
.add-task-box .fi{margin-bottom:8px}
.add-task-box .fi:last-of-type{margin-bottom:8px}

/* ── HONORÁRIOS ── */
.hon-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.hon-card{background:var(--bg);border-radius:10px;padding:12px}
.hon-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.hon-val{font-size:16px;font-weight:800;color:var(--text)}
.hon-val.empty{font-size:13px;color:var(--muted);font-weight:400;font-style:italic}

/* ── TAGS EDITOR ── */
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag-ed{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;color:#fff}
.tag-del{background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;font-size:14px;line-height:1;padding:0 0 0 3px}
.tag-del:hover{color:#fff}
.tag-add-row{display:flex;gap:6px;align-items:center}
.tag-add-row .fi{flex:1;margin:0;resize:none;min-height:unset}
input[type="color"].cpick{width:34px;height:34px;border:none;border-radius:7px;cursor:pointer;padding:2px;border:1px solid var(--border)}
.preset-colors{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.pc{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.pc:hover,.pc.sel{border-color:#fff;box-shadow:0 0 0 2px var(--primary);transform:scale(1.1)}

/* ── HISTORY ── */
.hist-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:5px}
.hist-dot.task{background:var(--ok)}
.hist-dot.move{background:var(--c4)}
.hist-dot.warn{background:var(--warn)}
.hist-dot.note{background:#F59E0B}
/* ── NOTE BOX ── */
.note-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:14px;margin-bottom:4px}
.note-box-label{font-size:11px;font-weight:700;color:#92400E;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.note-ta{min-height:72px;resize:vertical;border-color:#FDE68A !important;background:#fff;margin-bottom:8px}
.note-ta:focus{border-color:#F59E0B !important}
.hist-body{flex:1}
.hist-action{font-size:12px;font-weight:600;color:var(--text)}
.hist-detail{font-size:12px;color:var(--muted);margin-top:1px}
.hist-date{font-size:11px;color:var(--muted);flex-shrink:0;white-space:nowrap;margin-top:3px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.on{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:16px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hd{padding:22px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:17px;font-weight:800}
.modal-bd{padding:18px 24px}
.modal-ft{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--surface)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);outline:none;font-family:inherit;background:var(--surface);resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--primary)}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:18px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.btn-lg{font-size:13px;padding:9px 20px;border-radius:8px;cursor:pointer;border:none;font-weight:700;font-family:inherit;transition:all .15s}
.btn-lg.p{background:var(--primary);color:#fff}.btn-lg.p:hover{background:var(--primary-dark)}
.btn-lg.g{background:var(--bg);color:var(--text);border:1px solid var(--border)}.btn-lg.g:hover{border-color:var(--primary)}

/* ── CHAT BUBBLES (Anotações) ── */
.note-bubble{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:12px;padding:11px 13px;position:relative}
.note-bubble-text{font-size:14px;color:#14532D;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.note-bubble-meta{display:flex;align-items:center;gap:6px;margin-top:5px;justify-content:flex-end}
.note-bubble-time{font-size:11px;color:#15803D}
.note-edit-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:0 2px;color:#15803D;opacity:.7;transition:opacity .15s}
.note-edit-btn:hover{opacity:1}
.note-del-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:0 2px;color:#F44336;opacity:.6;line-height:1;transition:opacity .15s}
.note-del-btn:hover{opacity:1}
.note-input-wrap{display:flex;gap:8px;align-items:flex-end;margin-top:8px}
.note-input-wrap .fi{flex:1;min-height:42px;resize:none;border-radius:20px;padding:10px 14px;margin:0}
.note-input-wrap .btn-s{white-space:nowrap;height:42px;border-radius:20px;padding:0 18px}
.section-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:4px 0 10px;display:flex;align-items:center;gap:6px}
/* ── EDIT CLIENT BUTTONS ── */
.btn-edit-card{width:100%;padding:10px;border-radius:8px;border:1px solid #BFDBFE;background:#EFF6FF;color:#1D4ED8;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:8px}
.btn-edit-card:hover{background:#DBEAFE;border-color:#3B82F6}
.btn-save-client{flex:1;padding:10px 16px;border-radius:8px;border:none;background:#10B981;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-save-client:hover{background:#059669}
.btn-cancel-edit{flex:1;padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-cancel-edit:hover{border-color:var(--primary)}
.edit-mode-banner{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#1D4ED8;font-weight:600;display:flex;align-items:center;gap:8px}
/* ── GLOBAL TAGS ── */
.global-tags-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.global-tag-item{display:flex;align-items:center;gap:3px}
.tag-edit-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:0 2px;color:var(--muted);transition:color .15s}
.tag-edit-btn:hover{color:var(--primary)}
.tag-del-global{background:none;border:none;cursor:pointer;font-size:15px;padding:0 2px;color:var(--muted);line-height:1;transition:color .15s}
.tag-del-global:hover{color:var(--alert)}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94A3B8}

/* ── COLUMN STATUS MOVE ── */
.panel-col-select{margin-top:8px}

/* ── MISC ── */
.no-select{user-select:none}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.badge.j{background:#EDE9FE;color:#7C3AED}
.badge.a{background:#DBEAFE;color:#1D4ED8}
.badge.n{background:var(--bg);color:var(--muted)}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2) }
function now(){ return new Date().toISOString() }
function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('pt-BR');
}
function fmtDateTime(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function parseMoney(value){
  const raw = String(value||'').trim();
  if(!raw) return 0;
  const clean = raw.replace(/[^\d,.-]/g,'');
  if(!clean) return 0;
  const normalized = clean.includes(',')
    ? clean.replace(/\./g,'').replace(',','.')
    : (/^\d{1,3}(\.\d{3})+$/.test(clean) ? clean.replace(/\./g,'') : clean);
  const n = parseFloat(normalized);
  return Number.isFinite(n) ? n : 0;
}
function formatMoney(value){
  const n = typeof value === 'number' ? value : parseMoney(value);
  if(!n) return '';
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function parsePercent(value){
  const n = parseFloat(String(value||'').replace('%','').replace(',','.'));
  return Number.isFinite(n) ? n : 0;
}
function formatPercent(value){
  const n = parsePercent(value);
  if(!n) return '';
  return `${String(n).replace('.',',')}%`;
}
function dayStatus(dateStr){
  if(!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr+'T00:00:00');
  const diff = Math.ceil((d-today)/(86400000));
  if(diff<0) return 'overdue';
  if(diff<=2) return 'urgent';
  if(diff<=7) return 'warning';
  return 'ok';
}
function esc(str){ return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function tagKey(label){ return (label||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function isProcessDeadline(t){ return t && t.kind === 'process_deadline'; }
function isPaymentDeadline(t){ return t && t.kind === 'payment_deadline'; }
function taskKindLabel(t){
  if(isProcessDeadline(t)) return 'Prazo processual';
  if(isPaymentDeadline(t)) return 'Pagamento do cliente';
  return 'Tarefa interna';
}
function taskKindClass(t){
  if(isProcessDeadline(t)) return 'process';
  if(isPaymentDeadline(t)) return 'payment';
  return 'internal';
}
function nextKindActionLabel(t){
  if(isProcessDeadline(t)) return 'Pagamento';
  if(isPaymentDeadline(t)) return 'Tarefa';
  return 'Prazo';
}
function hasAlert(c){
  return c.tasks.some(t=>{
    if(t.done) return false;
    if(!t.deadline) return false;
    const s = dayStatus(t.deadline);
    return s==='overdue'||s==='urgent'||s==='warning';
  });
}
function nextDeadline(c){
  const active = c.tasks.filter(t=>!t.done&&t.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  return active.length ? active[0].deadline : null;
}
function nextProcessDeadline(c){
  const active = c.tasks.filter(t=>isProcessDeadline(t)&&!t.done&&t.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  return active.length ? active[0] : null;
}
function nextPaymentDeadline(c){
  const active = c.tasks.filter(t=>isPaymentDeadline(t)&&!t.done&&t.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  return active.length ? active[0] : null;
}
function pendingCount(){
  let n=0;
  clients.forEach(c=>c.tasks.forEach(t=>{
    if(!t.done&&t.deadline){const s=dayStatus(t.deadline);if(s==='overdue'||s==='urgent'||s==='warning')n++;}
  }));
  return n;
}

let fbRef, fbReady = false;

function initFirebase(){
  const configured = Object.values(FIREBASE_CONFIG).every(v => v !== 'COLE_AQUI');
  if(!configured){
    showSetupBanner();
    clients = [];
    renderAll();

  try {

    });

}

function enterApp(user){
  currentUser = user;
  document.body.classList.remove('auth-locked');
  const emailEl = document.getElementById('user-email');
  if(emailEl) emailEl.textContent = user.email || '';
  listenKanban();
}

function leaveApp(){
  currentUser = null;
  fbReady = false;
  if(fbRef) fbRef.off();
  fbRef = null;
  clients = [];
  globalTags = [];
  activeClientId = null;
  closePanel();
  document.body.classList.add('auth-locked');
  setAuthError('');
  renderAll();
}

function listenKanban(){
  if(!currentUser) return;
  if(fbRef) fbRef.off();
  fbRef = firebase.database().ref('kanban');
  setSyncStatus('connecting');
  fbRef.on('value', snap => {
    const raw = snap.val();
    if(typeof raw === 'string'){
      try {
        const parsed = JSON.parse(raw);
        if(Array.isArray(parsed)){
          clients = parsed.map(normalizeClient).filter(Boolean);
          globalTags = extractGlobalTags(clients);
        } else {
          clients = (parsed.clients||[]).map(normalizeClient).filter(Boolean);
          globalTags = parsed.globalTags||[];
        }
      } catch(e){
        clients = [];
        globalTags = [];
        console.error('Erro ao ler dados salvos:', e);
      }
    } else if(raw && typeof raw === 'object') {
      clients = (raw.clients||[]).map(normalizeClient).filter(Boolean);
      globalTags = raw.globalTags||extractGlobalTags(clients);
    } else {
      clients = [];
      globalTags = [];
    }
    fbReady = true;
    setSyncStatus('synced');
    renderAll();
  }, err => { setSyncStatus('error'); console.error(err); });
}

function login(e){
  e.preventDefault();
  if(!auth) return setAuthError('Firebase Authentication não foi inicializado.');
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-submit');
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  setAuthError('');
  auth.signInWithEmailAndPassword(email, password)
    .catch(err => setAuthError(authMessage(err)))
    .finally(() => {
      btn.disabled = false;
      btn.textContent = 'Entrar';
    });
}

function logout(){
  if(auth) auth.signOut();
}

function setAuthError(msg){
  const el = document.getElementById('auth-error');
  if(!el) return;
  el.textContent = msg || '';
  el.classList.toggle('on', !!msg);
}

function authMessage(err){
  const code = err && err.code ? err.code : '';
  if(code.includes('user-not-found') || code.includes('wrong-password') || code.includes('invalid-credential')) return 'E-mail ou senha inválidos.';
  if(code.includes('too-many-requests')) return 'Muitas tentativas. Aguarde um pouco e tente novamente.';
  if(code.includes('operation-not-allowed')) return 'Ative o provedor E-mail/Senha no Firebase Authentication.';
  return 'Não foi possível entrar. Verifique o acesso e tente novamente.';
}

function extractGlobalTags(clientList){
  const seen = {};
  const result = [];
  (clientList||[]).forEach(c=>{
    (c.tags||[]).forEach(t=>{
      const key = t && typeof t==='object' ? tagKey(t.label) : '';
      if(t && typeof t==='object' && t.label && !seen[key]){
        seen[key] = true;
        result.push({id:t.id||uid(), label:t.label, color:t.color||'#3B82F6'});
      }
    });
  });
  return result;
}

function mkClient(fields){
  const n = now();
  const base = {
    id:uid(), name:'', benefitType:'', via:'', processNumber:'', tribunal:'',
    column:'em_analise', currentSituation:'', summary:'', tags:[], cardColor:'',
    credentials:{cpf:'',govUser:'',password:''},
    honorarios:{valorCausa:'',valorHonorarios:'',percentual:'',observacao:''},
    tasks:[], history:[], createdAt:n, updatedAt:n,
  };
  const c = {...base, ...fields};
  if(!c.history.length) c.history=[{id:uid(),date:n,action:'Cliente cadastrado',details:'Cadastro inicial do sistema',type:'default'}];
  return c;
}
function mkTask(desc, deadline='', done=false, kind='internal'){
  return {id:uid(), description:desc, deadline, done, kind, doneAt:'', createdAt:now()};
}
function normalizeClient(c){
  if(!c || typeof c !== 'object') return null;
  if(!c.id) c.id = uid();
  if(!c.name) c.name = '';
  if(!c.benefitType) c.benefitType = '';
  if(!c.via) c.via = '';
  if(!c.processNumber) c.processNumber = '';
  if(!c.tribunal) c.tribunal = '';
  if(!c.column) c.column = 'em_analise';
  if(!c.currentSituation) c.currentSituation = '';
  if(!c.summary) c.summary = '';
  if(!c.cardColor) c.cardColor = '';
  if(!Array.isArray(c.tags)) c.tags = [];
  if(!Array.isArray(c.tasks)) c.tasks = [];
  if(!Array.isArray(c.history)) c.history = [];
  if(!c.credentials || typeof c.credentials !== 'object') c.credentials = {cpf:'',govUser:'',password:''};
  if(!c.honorarios || typeof c.honorarios !== 'object') c.honorarios = {valorCausa:'',valorHonorarios:'',percentual:'',observacao:''};
  if(!c.honorarios.percentual && String(c.honorarios.valorHonorarios||'').includes('%')){
    c.honorarios.percentual = c.honorarios.valorHonorarios;
    c.honorarios.valorHonorarios = '';
  }
  c.honorarios.valorCausa = formatMoney(c.honorarios.valorCausa) || c.honorarios.valorCausa || '';
  c.honorarios.percentual = formatPercent(c.honorarios.percentual) || '';
  if(c.honorarios.percentual){
    const calc = parseMoney(c.honorarios.valorCausa) * parsePercent(c.honorarios.percentual) / 100;
    if(calc) c.honorarios.valorHonorarios = formatMoney(calc);
  } else {
    c.honorarios.valorHonorarios = formatMoney(c.honorarios.valorHonorarios) || c.honorarios.valorHonorarios || '';
  }
  c.tasks = c.tasks.map(t => {
    if(!t || typeof t !== 'object') return null;
    if(!t.id) t.id = uid();
    if(!t.description) t.description = '';
    if(typeof t.done !== 'boolean') t.done = false;
    if(!t.kind) t.kind = 'internal';
    if(!t.deadline) t.deadline = '';
    if(!t.doneAt) t.doneAt = '';
    if(!t.createdAt) t.createdAt = now();
    return t;
  }).filter(Boolean);
  c.history = c.history.map(h => {
    if(!h || typeof h !== 'object') return null;
    if(!h.id) h.id = uid();
    if(!h.date) h.date = now();
    if(!h.action) h.action = '';
    if(!h.details) h.details = '';
    if(!h.type) h.type = 'default';
    return h;
  }).filter(Boolean);
  c.tags = c.tags.map(t => {
    if(!t || typeof t !== 'object') return null;
    if(!t.id) t.id = uid();
    if(!t.label) t.label = '';
    if(!t.color) t.color = '#6366F1';
    return t;
  }).filter(Boolean);
  const tagSeen = {};
  c.tags = c.tags.filter(t=>{
    const key = tagKey(t.label);
    if(!key || tagSeen[key]) return false;
    tagSeen[key] = true;
    return true;
  });
  return c;
}

function getProcessDeadlineItems(clientList=clients){
  const items = [];
  clientList.forEach(c=>{
    (c.tasks||[]).forEach(t=>{
      if(isProcessDeadline(t) && !t.done && t.deadline){
        items.push({...t, clientId:c.id, clientName:c.name});
      }
    });
  });
  return items.sort((a,b)=>a.deadline.localeCompare(b.deadline));
}

function getPaymentDeadlineItems(clientList=clients){
  const items = [];
  clientList.forEach(c=>{
    (c.tasks||[]).forEach(t=>{
      if(isPaymentDeadline(t) && !t.done && t.deadline){
        items.push({...t, clientId:c.id, clientName:c.name});
      }
    });
  });
  return items.sort((a,b)=>a.deadline.localeCompare(b.deadline));
}

function getSidebarTaskItems(clientList=clients){
  const items = [];
  clientList.forEach(c=>{
    (c.tasks||[]).forEach(t=>{
      if(!t.done && !isProcessDeadline(t) && !isPaymentDeadline(t)){
        items.push({...t, clientId:c.id, clientName:c.name});
      }
    });
  });
  return items.sort((a,b)=>{
    if(!a.deadline&&!b.deadline) return a.clientName.localeCompare(b.clientName);
    if(!a.deadline) return 1;
    if(!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
}

  const paymentList = paymentItems.slice(0,4).map(t=>{
    const s = dayStatus(t.deadline);
    const suffix = s==='overdue'?'Pagamento vencido':s==='urgent'?'Cobrar agora':s==='warning'?'Cobrar em breve':'Pagamento';
    return `<div class="kanban-alert-item payment" onclick="openPanel('${t.clientId}')">
      <div class="kanban-alert-client">${esc(t.clientName)}</div>
      <div class="kanban-alert-desc">${esc(t.description)}</div>
      <div class="kanban-alert-date">${suffix}: ${fmtDate(t.deadline)}</div>
    </div>`;
  }).join('');
  const taskList = taskItems.slice(0,4).map(t=>{
    const s = t.deadline ? dayStatus(t.deadline) : null;
    const suffix = !t.deadline ? 'Sem prazo' : s==='overdue'?'Vencida':s==='urgent'?'Urgente':s==='warning'?'Em breve':'Prazo';
    return `<div class="kanban-alert-item task" onclick="openPanel('${t.clientId}')">
      <div class="kanban-alert-client">${esc(t.clientName)}</div>
      <div class="kanban-alert-desc">${esc(t.description)}</div>
      <div class="kanban-alert-date">${t.deadline ? `${suffix}: ${fmtDate(t.deadline)}` : suffix}</div>
    </div>`;
  }).join('');
  el.className = 'kanban-alerts';
  el.innerHTML = `
    <div class="kanban-alert-section">
      <div class="kanban-alert-head">
        <div class="kanban-alert-title">Prazos processuais ativos</div>
        <div class="kanban-alert-count">${processUrgent ? sidebarCount(processUrgent,'exige atenção','exigem atenção') : sidebarCount(processItems.length,'cadastrado','cadastrados')}</div>
      </div>
      ${processItems.length?`<div class="kanban-alert-row">${processList}</div>`:'<div class="kanban-alert-empty">Nenhum prazo processual ativo.</div>'}
    </div>
    <div class="kanban-alert-section">
      <div class="kanban-alert-head">
        <div class="kanban-alert-title" style="color:#166534">Pagamentos para cobrar</div>
        <div class="kanban-alert-count" style="color:#166534;background:#DCFCE7">${paymentAttention ? sidebarCount(paymentAttention,'exige cobrança','exigem cobrança') : sidebarCount(paymentItems.length,'cadastrado','cadastrados')}</div>
      </div>
      ${paymentItems.length?`<div class="kanban-alert-row">${paymentList}</div>`:'<div class="kanban-alert-empty">Nenhum pagamento ativo.</div>'}
    </div>
    <div class="kanban-alert-section">
      <div class="kanban-alert-head">
        <div class="kanban-alert-title" style="color:#9A3412">Tarefas</div>
        <div class="kanban-alert-count" style="color:#9A3412;background:#FFEDD5">${taskAttention ? sidebarCount(taskAttention,'exige atenção','exigem atenção') : sidebarCount(taskItems.length,'cadastrada','cadastradas')}</div>
      </div>
      ${taskItems.length?`<div class="kanban-alert-row">${taskList}</div>`:'<div class="kanban-alert-empty">Nenhuma tarefa ativa.</div>'}
    </div>`;
}

function renderCard(c){
  const alert = hasAlert(c);
  const processTask = nextProcessDeadline(c);
  const paymentTask = nextPaymentDeadline(c);
  const nd = nextDeadline(c);
  const ds = nd ? dayStatus(nd) : null;
  const tagsHtml = c.tags.map(t=>`<span class="tag" style="background:${esc(t.color)}">${esc(t.label)}</span>`).join('');
  const viaHtml = c.via ? `<div class="card-via"><span class="via-pill ${c.via==='Judicial'?'j':'a'}">${esc(c.via)}</span></div>` : '';
  let deadlineHtml = '';
  if(nd){
    const cls = ds==='overdue'?'overdue':ds==='urgent'?'urgent':ds==='warning'?'warning':'';
    const prefix = ds==='overdue'?'⚠️ Vencido: ':ds==='urgent'?'🔴 ':ds==='warning'?'⚠️ ':'📅 ';
    deadlineHtml = `<div class="card-deadline ${cls}">${prefix}${fmtDate(nd)}</div>`;
  }
  const processHtml = processTask ? `<div class="card-process-deadline">
    <span class="card-process-label">Prazo processual</span>
    ${esc(processTask.description)} — ${fmtDate(processTask.deadline)}
  </div>` : '';
  const paymentHtml = paymentTask ? `<div class="card-payment-deadline">
    <span class="card-payment-label">Pagamento do cliente</span>
    ${esc(paymentTask.description)} — ${fmtDate(paymentTask.deadline)}
  </div>` : '';
  const colorStyle = c.cardColor ? `border-left-color:${c.cardColor}` : '';
  return `<div class="card${c.cardColor?' has-color':''}" id="card-${c.id}" style="${colorStyle}" draggable="true"
    onclick="openPanel('${c.id}')"
    ondragstart="onDragStart(event,'${c.id}')"
    ondragend="onDragEnd(event)">
    <div class="card-top">
      <div class="card-name">${esc(c.name)}</div>
      ${alert?`<div class="card-alert"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>`:''}
    </div>
    <div class="card-benefit">${esc(c.benefitType)||'<em>Tipo não definido</em>'}</div>
    ${tagsHtml?`<div class="card-tags">${tagsHtml}</div>`:''}
    ${viaHtml}
    ${processHtml}
    ${paymentHtml}
    ${deadlineHtml}
  </div>`;
}

function updateCounts(){

}

// ─────────────────────────────────────────────
//  DRAG & DROP
// ─────────────────────────────────────────────
function onDragStart(e, id){
  dragId = id;
  setTimeout(()=>{
    const el = document.getElementById('card-'+id);
    if(el) el.classList.add('dragging');
  },0);
}
function onDragEnd(e){
  if(dragId){
    const el = document.getElementById('card-'+dragId);
    if(el) el.classList.remove('dragging');
  }
  document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('over'));
}
function onDragOver(e, colId){
  e.preventDefault();
  document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('over'));
  document.getElementById('col-'+colId).classList.add('over');
}
function onDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('over');
}
function onDrop(e, colId){
  e.preventDefault();
  document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('over'));
  if(!dragId) return;
  const c = clients.find(x=>x.id===dragId);
  if(c && c.column !== colId){
    const oldLabel = COL_LABELS[c.column];
    const newLabel = COL_LABELS[colId];
    c.column = colId;
    addHistory(c,'Movido de coluna',`De "${oldLabel}" para "${newLabel}"`, 'move');
    save();
    renderBoard();
    if(activeClientId===c.id) renderPanelSub(c);
  }
  dragId = null;
}

function openPanel(id){
  activeClientId = id;
  activeTab = 'resumo';
  resumoEditMode = false;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active', t.dataset.tab==='resumo'));
  renderPanel();
  document.getElementById('overlay').classList.add('on');
  document.getElementById('panel').classList.add('on');
}
function closePanel(){
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('panel').classList.remove('on');
  activeClientId = null;
}
function switchTab(el){
  activeTab = el.dataset.tab;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderPanelBody();
}
function renderPanel(){
  const c = clients.find(x=>x.id===activeClientId);
  if(!c) return;
  document.getElementById('panel-name').textContent = c.name;
  renderPanelSub(c);
  renderPanelBody();
}
function renderPanelSub(c){
  const col = COLS.find(x=>x.id===c.column);
  const viaCls = c.via==='Judicial'?'j':c.via==='Administrativa'?'a':'n';
  document.getElementById('panel-sub').innerHTML =
    `<span class="badge ${viaCls}">${c.via||'Via indefinida'}</span>` +
    (col?`<span class="badge n" style="color:${col.color};background:${col.color}18">${col.label}</span>`:'') +
    (c.processNumber?`<span style="font-size:11px;color:var(--muted)">${esc(c.processNumber)}${c.tribunal?' ('+esc(c.tribunal)+')':''}</span>`:'');
}
function getPendingTasks(c){
  return (c.tasks||[]).filter(t=>!t.done);
}
function getNextTask(c){
  const pending = getPendingTasks(c);
  const process = pending.filter(t=>isProcessDeadline(t)&&t.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  if(process.length) return process[0];
  const payments = pending.filter(t=>isPaymentDeadline(t)&&t.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  if(payments.length) return payments[0];
  const withDate = pending.filter(t=>t.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  return withDate[0] || pending[0] || null;
}
function getCaseStatusMeta(c){
  const pending = getPendingTasks(c);
  const next = getNextTask(c);
  const col = COLS.find(x=>x.id===c.column);
  if(next && next.deadline){
    const status = dayStatus(next.deadline);
    const prefix = isProcessDeadline(next) ? 'Prazo processual' : isPaymentDeadline(next) ? 'Pagamento do cliente' : 'Prazo';
    if(status==='overdue') return {title:`${prefix} vencido`, detail:`${next.description} venceu em ${fmtDate(next.deadline)}`, color:'#EF4444'};
    if(status==='urgent') return {title:`${prefix} urgente`, detail:`${next.description} até ${fmtDate(next.deadline)}`, color:'#F43F5E'};
    if(status==='warning') return {title:`${prefix} próximo`, detail:`${next.description} até ${fmtDate(next.deadline)}`, color:'#F59E0B'};
  }
  if(pending.length) return {title:`${pending.length} tarefa${pending.length>1?'s':''} pendente${pending.length>1?'s':''}`, detail:next?next.description:'Há atividades em aberto.', color:'#2563EB'};
  if(c.column==='finalizado') return {title:'Caso finalizado', detail:'Não há tarefas pendentes para este cliente.', color:'#10B981'};
  return {title:col?col.label:'Em acompanhamento', detail:'Sem tarefas pendentes cadastradas.', color:col?col.color:'#64748B'};
}
function renderPanelBody(){
  const c = clients.find(x=>x.id===activeClientId);
  if(!c) return;
  const body = document.getElementById('panel-body');
  try {
    if(activeTab==='resumo') body.innerHTML = tabResumo(c);
    else if(activeTab==='tarefas') body.innerHTML = tabTarefas(c);
    else if(activeTab==='historico') body.innerHTML = tabHistorico(c);
    else if(activeTab==='credenciais') body.innerHTML = tabCredenciais(c);
    else if(activeTab==='honorarios') body.innerHTML = tabHonorarios(c);
    else if(activeTab==='etiquetas') body.innerHTML = tabEtiquetas(c);
  } catch(e){
    body.innerHTML = `<div style="color:#EF4444;padding:12px;font-size:13px">Erro ao carregar aba: ${e.message}</div>`;
    console.error('renderPanelBody error:', e);
  }
}

  return `

      <div class="case-status" style="border-left-color:${meta.color}">
        <div class="case-status-label">Situação atual</div>

        </div>
        <div class="next-task-date ${dateStatus}">${next&&next.deadline?fmtDate(next.deadline):(next?'Sem prazo definido':'Tudo em dia')}</div>
      </div>
    </div>
    <div class="case-metrics">
      ${metric('Status', col?esc(col.label):'Não definido', !col)}
      ${metric('Prazos processuais', String(processPending.length))}
      ${metric('Pagamentos', String(paymentPending.length))}
      ${metric('Tarefas internas', String(internalPending.length))}
      ${metric('Concluídas', String(doneCount))}
    </div>
    <div class="case-section">
      <div class="case-section-title">Dados do processo</div>

function saveClientEdit(clientId){

  if(!name){ alert('Informe o nome.'); return; }

  c.processNumber = document.getElementById('re-proc').value.trim();
  c.tribunal = document.getElementById('re-tribunal').value;
  c.summary = document.getElementById('re-summary').value.trim();

function moveClientToCol(clientId, colId){
  const c = clients.find(x=>x.id===clientId);
  if(!c || c.column===colId) return;
  const oldLabel = COL_LABELS[c.column];
  const newLabel = COL_LABELS[colId];
  c.column = colId;
  addHistory(c,'Movido de coluna',`De "${oldLabel}" para "${newLabel}"`, 'move');

  renderBoard();
  renderPanelSub(c);
}
function setCardColor(clientId, color){
  const c = clients.find(x=>x.id===clientId);
  if(!c) return;
  c.cardColor = color;
  addHistory(c, color ? 'Cor do card alterada' : 'Cor do card removida', color||'', 'default');
  save();
  renderBoard();
  renderPanelBody();
}
function deleteClient(clientId){
  const c = clients.find(x=>x.id===clientId);
  if(!c) return;
  if(!confirm(`Remover "${c.name}" permanentemente?\n\nEsta ação não pode ser desfeita.`)) return;
  clients = clients.filter(x=>x.id!==clientId);
  save();
  closePanel();
  renderBoard();
  if(isTasksPageActive()) renderTasksPage();
}

// ── TAB: TAREFAS ──
function tabTarefas(c){
  const tasks = c.tasks;
  const pending = tasks.filter(t=>!t.done).length;
  const done = tasks.filter(t=>t.done).length;
  const processPending = tasks.filter(t=>!t.done&&isProcessDeadline(t)).length;
  const paymentPending = tasks.filter(t=>!t.done&&isPaymentDeadline(t)).length;
  const internalPending = tasks.filter(t=>!t.done&&!isProcessDeadline(t)&&!isPaymentDeadline(t)).length;
  const html = tasks.length===0 ? '<div style="color:var(--muted);font-size:13px;padding:8px 0">Nenhuma tarefa cadastrada.</div>' :
    tasks.map(t=>{
      const ds = t.deadline ? dayStatus(t.deadline) : null;
      const dateCls = !t.deadline?'none':ds==='overdue'?'overdue':ds==='urgent'?'urgent':ds==='warning'?'warning':'ok';
      const dateLabel = t.deadline ? `${fmtDate(t.deadline)}${ds==='overdue'?' (vencida)':ds==='urgent'?' (urgente)':ds==='warning'?' (em breve)':''}` : 'Sem prazo';
      return `<div class="task-pi ${isProcessDeadline(t)?'process-deadline':isPaymentDeadline(t)?'payment-deadline':''}">
        <div class="task-pcheck ${t.done?'done':''}" onclick="toggleTask('${c.id}','${t.id}')"></div>
        <div class="task-pbody">
          <div class="task-pdesc ${t.done?'done':''}">${esc(t.description)}</div>
          <div class="task-kind ${taskKindClass(t)}">${taskKindLabel(t)}</div>
          <div class="task-pdate ${dateCls}">${dateLabel}</div>
          ${t.done&&t.doneAt?`<div style="font-size:11px;color:var(--muted)">Concluída em ${fmtDateTime(t.doneAt)}</div>`:''}
        </div>
        ${!t.done?`<div style="display:flex;flex-direction:column;gap:2px">
          <button class="task-pdel" style="font-size:12px" onclick="toggleTaskKind('${c.id}','${t.id}')" title="Alternar tipo">${nextKindActionLabel(t)}</button>

function toggleTask(clientId, taskId){
  const c = clients.find(x=>x.id===clientId);
  if(!c) return;
  const t = c.tasks.find(x=>x.id===taskId);
  if(!t) return;
  t.done = !t.done;
  t.doneAt = t.done ? now() : '';
  if(t.done) addHistory(c,'Tarefa concluída', t.description, 'task');
  else addHistory(c,'Tarefa reaberta', t.description, 'default');
  save();
  renderPanelBody();
  renderBoard();
  if(isTasksPageActive()) renderTasksPage();
}
function editTask(clientId, taskId){
  const c = clients.find(x=>x.id===clientId);
  if(!c) return;
  const t = c.tasks.find(x=>x.id===taskId);
  if(!t) return;
  const newDesc = prompt('Editar tarefa:', t.description);
  if(newDesc===null) return;
  const trimmed = newDesc.trim();
  if(!trimmed){ alert('A descrição não pode ficar vazia.'); return; }
  const oldDesc = t.description;
  t.description = trimmed;
  if(oldDesc!==trimmed) addHistory(c,'Tarefa editada',trimmed,'task');
  save();
  renderPanelBody();
  if(isTasksPageActive()) renderTasksPage();
}
function deleteTask(clientId, taskId){
  const c = clients.find(x=>x.id===clientId);
  if(!c) return;
  const t = c.tasks.find(x=>x.id===taskId);
  if(!t) return;
  if(!confirm('Remover esta tarefa?')) return;
  c.tasks = c.tasks.filter(x=>x.id!==taskId);
  addHistory(c,'Tarefa removida', t.description, 'warn');
  save();
  renderPanelBody();
  renderBoard();
}
function addTask(clientId){
  const c = clients.find(x=>x.id===clientId);
  if(!c) return;
  const desc = document.getElementById('new-task-desc').value.trim();
  const date = document.getElementById('new-task-date').value;
  const kind = document.getElementById('new-task-kind').value;
  if(!desc){ alert('Informe a descrição da tarefa.'); return; }
  if(kind==='process_deadline' && !date){ alert('Prazo processual precisa ter data.'); return; }
  if(kind==='payment_deadline' && !date){ alert('Pagamento do cliente precisa ter data.'); return; }
  c.tasks.push(mkTask(desc, date, false, kind));
  addHistory(c, kind==='process_deadline'?'Prazo processual adicionado':kind==='payment_deadline'?'Pagamento do cliente adicionado':'Tarefa adicionada', desc+(date?' — data: '+fmtDate(date):''), 'task');
  save();
  renderPanelBody();
  renderBoard();
}
function toggleTaskKind(clientId, taskId){
  const c = clients.find(x=>x.id===clientId);
  if(!c) return;
  const t = c.tasks.find(x=>x.id===taskId);
  if(!t) return;
  if(!isProcessDeadline(t) && !isPaymentDeadline(t)){
    if(!t.deadline){ alert('Para marcar como prazo processual, informe uma data de prazo.'); return; }
    t.kind = 'process_deadline';
    addHistory(c,'Tarefa marcada como prazo processual',t.description,'warn');
  } else if(isProcessDeadline(t)) {
    t.kind = 'payment_deadline';
    addHistory(c,'Prazo convertido em pagamento do cliente',t.description,'task');
  } else {
    t.kind = 'internal';
    addHistory(c,'Pagamento convertido em tarefa interna',t.description,'task');
  }
  save();
  renderPanelBody();
  renderBoard();
  if(isTasksPageActive()) renderTasksPage();
}

function formatMoneyInput(input){
  const value = input.value;
  const digits = value.replace(/\D/g,'');
  if(!digits){ input.value=''; return; }
  input.value = (Number(digits)/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function formatPercentInput(input){
  let value = input.value.replace(/[^\d,.]/g,'').replace(',','.');
  if(!value){ input.value=''; updateHonorariosCalc(); return; }
  const parts = value.split('.');
  if(parts.length>2) value = `${parts[0]}.${parts.slice(1).join('')}`;
  const n = parseFloat(value);
  input.value = Number.isFinite(n) ? `${String(n).replace('.',',')}%` : '';
}
function updateHonorariosCalc(){
  const causaEl = document.getElementById('h-causa');
  const percentEl = document.getElementById('h-percent');
  const honEl = document.getElementById('h-hon');
  if(!causaEl || !percentEl || !honEl) return;
  const causa = parseMoney(causaEl.value);
  const percent = parsePercent(percentEl.value);
  if(causa && percent) honEl.value = formatMoney(causa * percent / 100);
}
function formatNewClientHonorariosInput(input){
  if(input.value.includes('%')) formatPercentInput(input);
  else formatMoneyInput(input);
}

}

function applyGlobalTag(clientId, tagId){
  const c = clients.find(x=>x.id===clientId);
  const tag = globalTags.find(t=>t.id===tagId);
  if(!c||!tag) return;
  if(c.tags.some(t=>t.id===tagId || tagKey(t.label)===tagKey(tag.label))) return;
  c.tags.push({...tag});
  addHistory(c,'Etiqueta aplicada',tag.label,'default');
  save(); renderPanelBody(); renderBoard();
}
function removeTagById(clientId, tagId){
  const c = clients.find(x=>x.id===clientId);
  if(!c) return;
  const globalTag = globalTags.find(x=>x.id===tagId);
  const key = globalTag ? tagKey(globalTag.label) : '';
  const t = c.tags.find(x=>x.id===tagId || (key && tagKey(x.label)===key));
  if(!t) return;
  const removeKey = tagKey(t.label);
  c.tags = c.tags.filter(x=>x.id!==tagId && tagKey(x.label)!==removeKey);
  addHistory(c,'Etiqueta removida',t.label,'default');
  save(); renderPanelBody(); renderBoard();
}
// backward compat
function removeTag(clientId, tagId){ removeTagById(clientId, tagId); }
function addGlobalTag(clientId){
  const c = clients.find(x=>x.id===clientId);
  if(!c) return;
  const label = document.getElementById('tag-label').value.trim();
  const color = document.getElementById('tag-color').value;
  if(!label) return;
  const labelKey = tagKey(label);
  const existing = globalTags.find(t=>tagKey(t.label)===labelKey);
  if(existing){
    if(!c.tags.some(t=>t.id===existing.id || tagKey(t.label)===labelKey)){
      c.tags.push({...existing});
      addHistory(c,'Etiqueta aplicada',existing.label,'default');
      save(); renderPanelBody(); renderBoard();
    } else { alert(`A etiqueta "${existing.label}" já está aplicada a este cliente.`); }
    return;
  }
  const newTag = {id:uid(), label, color};
  globalTags.push(newTag);
  c.tags.push({...newTag});
  addHistory(c,'Etiqueta criada e aplicada',label,'default');
  save(); renderPanelBody(); renderBoard();
}
function editGlobalTag(tagId){
  const tag = globalTags.find(t=>t.id===tagId);
  if(!tag) return;
  const newLabel = prompt('Nome da etiqueta:', tag.label);
  if(!newLabel||newLabel.trim()===tag.label) return;
  const oldKey = tagKey(tag.label);
  tag.label = newLabel.trim();
  clients.forEach(c=>{
    const ct=c.tags.find(t=>t.id===tagId || tagKey(t.label)===oldKey);
    if(ct) ct.label=tag.label;
    const seen = {};
    c.tags = c.tags.filter(t=>{
      const key = tagKey(t.label);
      if(!key || seen[key]) return false;
      seen[key] = true;
      return true;
    });
  });
  save(); renderPanelBody(); renderBoard();
}
function deleteGlobalTag(tagId){
  const tag = globalTags.find(t=>t.id===tagId);
  if(!tag) return;
  if(!confirm(`Excluir etiqueta "${tag.label}" de todos os clientes?`)) return;
  globalTags = globalTags.filter(t=>t.id!==tagId);
  const key = tagKey(tag.label);
  clients.forEach(c=>{ c.tags=c.tags.filter(t=>t.id!==tagId && tagKey(t.label)!==key); });
  save(); renderPanelBody(); renderBoard();
}

//  TASKS PAGE
// ─────────────────────────────────────────────
function setFilter(el, f){
  taskFilter = f;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderTasksPage();
}
function renderTasksPage(){
  renderTasksList();
  renderCalendar();
}
function getAllTasks(){
  const all = [];
  clients.forEach(c=>{
    c.tasks.forEach(t=>{
      all.push({...t, clientName:c.name, clientId:c.id});
    });
  });
  return all;
}
function filterTasks(tasks){
  const today = new Date(); today.setHours(0,0,0,0);
  const sunday = new Date(today); sunday.setDate(today.getDate() + (6-today.getDay()));
  if(taskFilter==='pending') return tasks.filter(t=>!t.done);
  if(taskFilter==='done') return tasks.filter(t=>t.done);
  if(taskFilter==='overdue') return tasks.filter(t=>!t.done&&t.deadline&&new Date(t.deadline+'T00:00:00')<today);
  if(taskFilter==='process') return tasks.filter(t=>!t.done&&isProcessDeadline(t));
  if(taskFilter==='payment') return tasks.filter(t=>!t.done&&isPaymentDeadline(t));
  if(taskFilter==='internal') return tasks.filter(t=>!t.done&&!isProcessDeadline(t)&&!isPaymentDeadline(t));
  if(taskFilter==='today'){
    return tasks.filter(t=>{
      if(t.done||!t.deadline) return false;
      const d = new Date(t.deadline+'T00:00:00');
      return d.getTime()===today.getTime();
    });
  }
  if(taskFilter==='week'){
    return tasks.filter(t=>{
      if(t.done||!t.deadline) return false;
      const d = new Date(t.deadline+'T00:00:00');
      return d>=today && d<=sunday;
    });
  }
  return tasks;
}
function renderTasksList(){
  const list = document.getElementById('tasks-list');
  const all = getAllTasks();
  let tasks = filterTasks(all);
  tasks.sort((a,b)=>{
    if(isProcessDeadline(a)!==isProcessDeadline(b)) return isProcessDeadline(a) ? -1 : 1;
    if(isPaymentDeadline(a)!==isPaymentDeadline(b)) return isPaymentDeadline(a) ? -1 : 1;
    if(!a.deadline&&!b.deadline) return 0;
    if(!a.deadline) return 1;
    if(!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
  if(tasks.length===0){
    list.innerHTML = `<div class="tasks-empty">✅ Nenhuma tarefa nesta categoria.</div>`;
    return;
  }
  // group by date
  const groups = {};
  tasks.forEach(t=>{
    const key = t.deadline || '__sem_prazo__';
    if(!groups[key]) groups[key]=[];
    groups[key].push(t);
  });
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '';
  Object.keys(groups).sort().forEach(key=>{
    let label;
    if(key==='__sem_prazo__'){ label='Sem Prazo Definido'; }
    else {
      const d = new Date(key+'T00:00:00');
      const diff = Math.ceil((d-today)/86400000);
      if(diff<0) label=`Vencida — ${fmtDate(key)}`;
      else if(diff===0) label=`Hoje — ${fmtDate(key)}`;
      else if(diff===1) label=`Amanhã — ${fmtDate(key)}`;
      else label=fmtDate(key);
    }
    html+=`<div class="tgroup-title">${label}</div>`;
    groups[key].forEach(t=>{
      const ds = t.deadline?dayStatus(t.deadline):null;
      const cls = `${t.done?'done-item':ds==='overdue'?'overdue':ds==='urgent'?'urgent':ds==='warning'?'warning':''} ${isProcessDeadline(t)?'process-deadline':isPaymentDeadline(t)?'payment-deadline':''}`;
      const dateCls = !t.deadline?'none':ds==='overdue'?'overdue':ds==='urgent'?'urgent':ds==='warning'?'warning':'ok';
      html+=`<div class="ti ${cls}">
        <div class="ti-check ${t.done?'done':''}" onclick="toggleTaskGlobal('${t.clientId}','${t.id}')"></div>
        <div class="ti-body">
          <div class="ti-client" onclick="openPanel('${t.clientId}')">${esc(t.clientName)}</div>
          <div class="ti-desc">${esc(t.description)}</div>
          <div class="task-kind ${taskKindClass(t)}">${taskKindLabel(t)}</div>
          ${t.deadline?`<div class="ti-date ${dateCls}">📅 ${fmtDate(t.deadline)}</div>`:'<div class="ti-date none">Sem prazo</div>'}
          ${t.done&&t.doneAt?`<div style="font-size:11px;color:var(--muted);margin-top:2px">Concluída em ${fmtDateTime(t.doneAt)}</div>`:''}
        </div>
      </div>`;
    });
  });
  list.innerHTML = html;
}
function toggleTaskGlobal(clientId, taskId){
  const c = clients.find(x=>x.id===clientId);
  if(!c) return;
  const t = c.tasks.find(x=>x.id===taskId);
  if(!t) return;
  t.done = !t.done;
  t.doneAt = t.done ? now() : '';
  if(t.done) addHistory(c,'Tarefa concluída',t.description,'task');
  else addHistory(c,'Tarefa reaberta',t.description,'default');
  save();
  renderTasksPage();
  renderBoard();
  updateCounts();
}

// ─────────────────────────────────────────────
//  CALENDAR
// ─────────────────────────────────────────────
function renderCalendar(){
  const cal = document.getElementById('calendar');
  const preview = document.getElementById('cal-preview');
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  // build task map
  const taskDays = {};
  getAllTasks().forEach(t=>{
    if(!t.done&&t.deadline) taskDays[t.deadline] = (taskDays[t.deadline]||[]); taskDays[t.deadline]||[];
    if(t.deadline&&!t.done) (taskDays[t.deadline]=taskDays[t.deadline]||[]).push(t);
  });
  const first = new Date(y,m,1).getDay();
  const total = new Date(y,m+1,0).getDate();
  const today = new Date(); const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  let grid = days.map(d=>`<div class="cal-dname">${d}</div>`).join('');
  for(let i=0;i<first;i++) grid+=`<div class="cal-day other"></div>`;
  for(let d=1;d<=total;d++){
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr===todayStr;
    const hasTasks = taskDays[dateStr]&&taskDays[dateStr].length>0;
    const hasProcess = hasTasks && taskDays[dateStr].some(isProcessDeadline);
    const hasPayment = hasTasks && taskDays[dateStr].some(isPaymentDeadline);
    const isSel = calSelected===dateStr;
    grid+=`<div class="cal-day${isToday?' today':''}${hasTasks?' has-task':''}${hasProcess?' has-process':''}${hasPayment?' has-payment':''}${isSel&&!isToday?' selected':''}" onclick="selectCalDay('${dateStr}')">${d}</div>`;
  }
  cal.innerHTML = `
    <div class="cal-nav">
      <button onclick="calPrev()">‹</button>
      <span class="cal-month">${months[m]} ${y}</span>
      <button onclick="calNext()">›</button>
    </div>
    <div class="cal-grid">${grid}</div>`;
  if(calSelected && taskDays[calSelected] && taskDays[calSelected].length){
    const items = taskDays[calSelected].sort((a,b)=>{
      if(isProcessDeadline(a)!==isProcessDeadline(b)) return isProcessDeadline(a)?-1:1;
      if(isPaymentDeadline(a)!==isPaymentDeadline(b)) return isPaymentDeadline(a)?-1:1;
      return 0;
    }).map(t=>`<div class="cal-pi"><div class="cal-pi-client">${esc(t.clientName)}</div><div class="task-kind ${taskKindClass(t)}">${taskKindLabel(t)}</div><div class="cal-pi-desc">${esc(t.description)}</div></div>`).join('');
    preview.innerHTML = `<div class="cal-preview"><div class="cal-preview-title">Tarefas em ${fmtDate(calSelected)}</div>${items}</div>`;
  } else if(calSelected){
    preview.innerHTML = `<div class="cal-preview"><div style="font-size:12px;color:var(--muted)">Sem tarefas neste dia.</div></div>`;
  } else {
    preview.innerHTML = '';
  }
}
function selectCalDay(d){ calSelected = calSelected===d?null:d; renderCalendar(); }
function calPrev(){ calDate = new Date(calDate.getFullYear(), calDate.getMonth()-1, 1); renderCalendar(); }
function calNext(){ calDate = new Date(calDate.getFullYear(), calDate.getMonth()+1, 1); renderCalendar(); }

// ─────────────────────────────────────────────
//  NEW CLIENT MODAL
// ─────────────────────────────────────────────
function openModal(){
  editingClientId = null;
  document.getElementById('modal-title').textContent = 'Novo Cliente';
  ['f-name','f-proc','f-summary','f-cpf','f-causa','f-hon','f-hon-obs'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('f-benefit').value='';
  document.getElementById('f-column').value='em_analise';
  document.getElementById('f-via').value='';
  document.getElementById('f-tribunal').value='';
  document.getElementById('modal-bg').classList.add('on');
}
function closeModal(){ document.getElementById('modal-bg').classList.remove('on'); }
function saveClient(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ alert('Informe o nome do cliente.'); return; }
  const benefit = document.getElementById('f-benefit').value;
  if(!benefit){ alert('Selecione o tipo de benefício.'); return; }
  const causaValue = formatMoney(document.getElementById('f-causa').value);
  const honRaw = document.getElementById('f-hon').value.trim();
  const honIsPercent = honRaw.includes('%');
  const honPercent = honIsPercent ? formatPercent(honRaw) : '';
  const honValue = honIsPercent && causaValue
    ? formatMoney(parseMoney(causaValue) * parsePercent(honPercent) / 100)
    : formatMoney(honRaw);
  const c = mkClient({
    name,
    benefitType: benefit,
    via: document.getElementById('f-via').value,
    column: document.getElementById('f-column').value,
    processNumber: document.getElementById('f-proc').value.trim(),
    tribunal: document.getElementById('f-tribunal').value,
    summary: document.getElementById('f-summary').value.trim(),
    credentials:{
      cpf: document.getElementById('f-cpf').value.trim(),
      govUser:'',
      password:'',
    },
    honorarios:{
      valorCausa: causaValue,
      valorHonorarios: honValue,
      percentual: honPercent,
      observacao: document.getElementById('f-hon-obs').value.trim(),
    },
  });
  clients.push(c);
  save();
  closeModal();
  renderBoard();
}
